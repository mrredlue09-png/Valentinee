<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Can you be my Girlfriend?</title>

<style>

body{
    margin:0;
    height:100vh;
    font-family: Arial, Helvetica, sans-serif;
    text-align:center;
    overflow:hidden;

    background: linear-gradient(270deg,#ff4e8a,#ff9a9e,#fbc2eb,#a6c1ee);
    background-size: 800% 800%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

h1{
    margin-top:120px;
    font-size:45px;
    color:white;
    text-shadow:2px 2px 10px rgba(0,0,0,0.4);
}

.buttons{
    margin-top:40px;
}

button{
    padding:15px 40px;
    margin:10px;
    font-size:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

#yesBtn{
    background:#ff4e8a;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    background:white;
}

.heart{
    position:absolute;
    bottom:-50px;
    font-size:30px;
    animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
    0%{
        transform:translateY(0) scale(0.8);
        opacity:1;
    }
    100%{
        transform:translateY(-110vh) scale(1.5);
        opacity:0;
    }
}

#celebration{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
}

#celebration h2{
    font-size:50px;
    color:#ff4e8a;
}

#banner{
    font-size:60px;
    animation:pop 1s ease infinite alternate;
}

@keyframes pop{
    from{transform:scale(1);}
    to{transform:scale(1.2);}
}

</style>
</head>

<body>

<h1>Can you be my Girlfriend? ❤️</h1>

<div class="buttons">
<button id="yesBtn">Yes</button>
<button id="noBtn">No</button>
</div>

<div id="celebration">
<div id="banner">🎉 Tamang desisyon yan 🎉</div>
<h2>You and me now ❤️</h2>
</div>

<script>

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (Math.random()*3+3) + "s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6001);
}

setInterval(createHeart,400);

document.getElementById("yesBtn").onclick = function(){
    document.getElementById("celebration").style.display="flex";
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", function(){
    const x = Math.random()*window.innerWidth;
    const y = Math.random()*window.innerHeight;

    noBtn.style.position="absolute";
    noBtn.style.left = x+"px";
    noBtn.style.top = y+"px";
});

</script>

</body>
</html>
